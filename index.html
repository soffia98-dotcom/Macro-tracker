<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Macro Tracker"/>
<title>Macro Tracker App</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f0e8;
  --card: #ffffff;
  --dark: #2d2416;
  --gold: #c8a96e;
  --muted: #9a8c7a;
  --light: #f0ece4;
  --green: #7a9e7e;
  --red: #e07a5f;
  --blue: #6b8cae;
  --border: #ede8e0;
  --nav-h: 64px;
  --serif: 'DM Serif Display', Georgia, serif;
  --sans: 'DM Sans', sans-serif;
}
html, body { height: 100%; background: var(--bg); font-family: var(--sans); color: var(--dark); overflow-x: hidden; }

/* HEADER */
.header { background: var(--dark); padding: 48px 20px 18px; position: relative; overflow: hidden; }
.header::before { content:''; position:absolute; top:-40px; right:-20px; width:140px; height:140px; border-radius:50%; background:rgba(200,169,110,0.12); }
.header::after { content:''; position:absolute; bottom:-50px; left:40px; width:100px; height:100px; border-radius:50%; background:rgba(200,169,110,0.07); }
.header-eyebrow { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--gold); font-weight:600; margin-bottom:3px; }
.header h1 { font-family:var(--serif); font-size:24px; color:#faf8f4; font-weight:400; }
.header-sub { font-size:11px; color:var(--muted); margin-top:2px; }

/* DAY TABS */
.day-tabs { background:var(--dark); display:flex; overflow-x:auto; scrollbar-width:none; }
.day-tabs::-webkit-scrollbar { display:none; }
.day-tab { flex-shrink:0; padding:9px 14px; border:none; cursor:pointer; font-family:var(--sans); font-size:11px; font-weight:600; transition:all 0.2s; background:transparent; color:var(--muted); white-space:nowrap; }
.day-tab.active { background:var(--bg); color:var(--dark); border-radius:10px 10px 0 0; }

/* BOTTOM NAV */
.bottom-nav { position:fixed; bottom:0; left:0; right:0; height:var(--nav-h); background:var(--dark); display:flex; z-index:100; border-top:1px solid rgba(255,255,255,0.06); }
.nav-btn { flex:1; border:none; background:transparent; color:var(--muted); cursor:pointer; font-family:var(--sans); font-size:10px; font-weight:600; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px; transition:color 0.2s; }
.nav-btn.active { color:var(--gold); }
.nav-icon { font-size:20px; line-height:1; }

/* PAGE */
.page { display:none; padding-bottom:calc(var(--nav-h) + 16px); }
.page.active { display:block; }
.body { padding:16px; max-width:500px; margin:0 auto; }

/* SUMMARY CARD */
.summary-card { background:var(--card); border-radius:18px; padding:18px; margin-bottom:16px; box-shadow:0 2px 16px rgba(45,36,22,0.07); }
.summary-top { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; }
.total-label { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:2px; font-weight:600; }
.total-kcal { font-family:var(--serif); font-size:32px; color:var(--dark); line-height:1; margin:3px 0; }
.total-kcal span { font-family:var(--sans); font-size:13px; color:var(--muted); }
.total-remaining { font-size:11px; margin-top:2px; }
.badge { width:52px; height:52px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; border:3px solid var(--gold); color:var(--gold); background:#fef3e2; }
.badge.over { border-color:var(--red); color:var(--red); background:#fdecea; }
.badge-label { font-size:10px; color:var(--muted); text-align:center; margin-top:3px; }
.progress-bar-bg { height:6px; background:var(--light); border-radius:99px; overflow:hidden; margin-bottom:16px; }
.progress-bar-fill { height:100%; border-radius:99px; background:linear-gradient(90deg, var(--green), var(--gold)); transition:width 0.5s ease; }
.progress-bar-fill.over { background:var(--red); }
.gauges { display:flex; justify-content:space-around; }
.gauge-wrap { display:flex; flex-direction:column; align-items:center; gap:3px; }
.gauge-label { font-size:10px; color:var(--muted); font-weight:500; }
.gauge-sub { font-size:10px; color:var(--muted); text-align:center; }

/* MEAL CARD */
.meal-card { background:var(--card); border-radius:16px; margin-bottom:12px; overflow:hidden; box-shadow:0 2px 12px rgba(45,36,22,0.06); }
.meal-header { display:flex; justify-content:space-between; align-items:center; padding:13px 14px; }
.meal-header.has-items { border-bottom:1px solid var(--border); }
.meal-icon { font-size:18px; margin-right:8px; }
.meal-name { font-weight:700; font-size:14px; color:var(--dark); }
.meal-totals { font-size:10px; color:var(--muted); margin-top:1px; }
.add-btn { background:var(--gold); color:#fff; border:none; border-radius:8px; padding:6px 12px; font-size:11px; font-weight:600; cursor:pointer; font-family:var(--sans); white-space:nowrap; }
.add-btn.cancel { background:var(--light); color:var(--muted); }
.add-btn.blue { background:var(--blue); }
.add-btn.green { background:var(--green); }

/* FOOD ITEM */
.food-item { display:flex; justify-content:space-between; align-items:center; padding:9px 14px; border-bottom:1px solid #faf8f4; }
.food-name { font-size:12px; color:var(--dark); font-weight:500; }
.food-macros { font-size:10px; color:#b0a090; margin-top:1px; }
.food-right { display:flex; align-items:center; gap:8px; }
.food-kcal { font-size:12px; font-weight:700; color:var(--dark); }
.del-btn { background:none; border:none; cursor:pointer; color:#d4c9b8; font-size:18px; line-height:1; padding:0 2px; }
.empty-meal { padding:11px 14px; font-size:11px; color:#c4b9a8; font-style:italic; }

/* FORMS */
.add-form { padding:0 14px 14px; background:#fff9f0; border-top:1.5px dashed #e0d5c5; }
.form-grid-2 { display:grid; grid-template-columns:2fr 1fr; gap:7px; margin-top:12px; margin-bottom:8px; }
.form-grid-3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:7px; margin-bottom:10px; }
.form-grid-4 { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:7px; margin-bottom:10px; }
.form-grid-full { margin-top:12px; margin-bottom:8px; }
.fi { width:100%; padding:8px 10px; border:1.5px solid var(--border); border-radius:8px; font-size:12px; font-family:var(--sans); background:#faf8f4; color:var(--dark); outline:none; -webkit-appearance:none; }
.fi:focus { border-color:var(--gold); }
.fi::placeholder { color:#c4b9a8; }
.fi-label { font-size:10px; color:var(--muted); font-weight:600; margin-bottom:4px; text-transform:uppercase; letter-spacing:1px; }
.form-btns { display:flex; gap:8px; }
.form-submit { flex:1; padding:9px; background:var(--gold); color:#fff; border:none; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; font-family:var(--sans); }
.form-submit.blue { background:var(--blue); }
.form-submit.green { background:var(--green); }
.form-cancel { flex:1; padding:9px; background:var(--light); color:var(--muted); border:none; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; font-family:var(--sans); }

/* SECTION HEADER */
.section-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; margin-top:4px; }
.section-title { font-family:var(--serif); font-size:18px; color:var(--dark); }

/* WORKOUT CARD */
.workout-card { background:var(--card); border-radius:16px; margin-bottom:12px; overflow:hidden; box-shadow:0 2px 12px rgba(45,36,22,0.06); }
.workout-card-header { padding:13px 14px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.workout-type-badge { font-size:10px; font-weight:700; padding:3px 8px; border-radius:99px; text-transform:uppercase; letter-spacing:1px; }
.workout-type-badge.lift { background:#e8f0ff; color:#6b8cae; }
.workout-type-badge.cardio { background:#e8f5e9; color:#7a9e7e; }
.workout-title { font-weight:700; font-size:14px; color:var(--dark); }
.workout-meta { font-size:10px; color:var(--muted); margin-top:2px; }
.exercise-row { padding:9px 14px; border-bottom:1px solid #faf8f4; display:flex; justify-content:space-between; align-items:center; }
.exercise-name { font-size:12px; font-weight:600; color:var(--dark); }
.exercise-detail { font-size:10px; color:var(--muted); margin-top:2px; }
.exercise-sets { font-size:11px; font-weight:700; color:var(--blue); }

/* PROGRESS */
.progress-card { background:var(--card); border-radius:16px; margin-bottom:12px; overflow:hidden; box-shadow:0 2px 12px rgba(45,36,22,0.06); }
.progress-entry { padding:12px 14px; border-bottom:1px solid #faf8f4; display:flex; justify-content:space-between; align-items:center; }
.progress-date { font-size:11px; font-weight:700; color:var(--dark); }
.progress-values { display:flex; gap:12px; }
.progress-val { text-align:center; }
.progress-val-num { font-size:13px; font-weight:700; color:var(--dark); font-family:var(--serif); }
.progress-val-label { font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; }
.progress-diff { font-size:10px; font-weight:600; }
.progress-diff.down { color:var(--green); }
.progress-diff.up { color:var(--red); }

/* CHART */
.chart-container { padding:14px; }
.chart-title { font-size:10px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:1.5px; margin-bottom:10px; }
canvas { width:100% !important; }

/* ADD DAY */
.add-day-btn { width:100%; padding:12px; background:transparent; border:1.5px dashed #d4c9b8; border-radius:12px; color:var(--muted); font-size:12px; font-weight:600; cursor:pointer; font-family:var(--sans); margin-bottom:16px; }
.add-day-form { background:var(--card); border-radius:14px; padding:16px; margin-bottom:14px; box-shadow:0 2px 12px rgba(45,36,22,0.06); }
.add-day-form h3 { font-size:13px; font-weight:700; margin-bottom:10px; color:var(--dark); }

.footer { text-align:center; font-size:10px; color:#b0a090; margin-top:4px; padding-bottom:8px; }
.empty-state { text-align:center; padding:32px 16px; color:var(--muted); font-size:13px; }
.empty-state .empty-icon { font-size:36px; margin-bottom:10px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-eyebrow">Sofia's Journey</div>
  <h1 id="header-title">Sofia's Weight Loss Journey</h1>
  <p class="header-sub" id="header-sub">Goal: 1300 kcal · 85g protein</p>
</div>

<!-- DAY TABS (macros page only) -->
<div class="day-tabs" id="day-tabs"></div>

<!-- PAGES -->
<div class="page active" id="page-macros">
  <div class="body">
    <div id="summary-card" class="summary-card"></div>
    <div id="meals-container"></div>
    <button class="add-day-btn" onclick="toggleAddDay()">＋ Add new day</button>
    <div id="add-day-form" style="display:none" class="add-day-form">
      <h3>New day</h3>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
        <input class="fi" id="new-day-label" placeholder="Label e.g. Wed 18 Mar"/>
        <input class="fi" id="new-day-id" placeholder="ID e.g. 2026-03-18"/>
      </div>
      <div class="form-btns">
        <button class="form-submit" onclick="addDay()">Add day</button>
        <button class="form-cancel" onclick="toggleAddDay()">Cancel</button>
      </div>
    </div>
    <div class="footer" id="footer-goals"></div>
  </div>
</div>

<div class="page" id="page-workout">
  <div class="body">
    <div class="section-header">
      <span class="section-title">Workouts</span>
      <button class="add-btn blue" onclick="toggleAddWorkout()">+ Log workout</button>
    </div>
    <div id="add-workout-form" style="display:none" class="workout-card" style="padding:16px">
      <div style="padding:14px">
        <div class="fi-label">Workout type</div>
        <div style="display:flex;gap:8px;margin-bottom:12px">
          <button id="wtype-lift" onclick="setWorkoutType('lift')" style="flex:1;padding:8px;border:1.5px solid var(--blue);border-radius:8px;background:#e8f0ff;color:var(--blue);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--sans)">🏋️ Weights</button>
          <button id="wtype-cardio" onclick="setWorkoutType('cardio')" style="flex:1;padding:8px;border:1.5px solid var(--border);border-radius:8px;background:var(--light);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;font-family:var(--sans)">🏃 Cardio</button>
        </div>
        <div class="fi-label">Date</div>
        <input class="fi" id="w-date" type="date" style="margin-bottom:10px"/>
        <div id="workout-type-fields"></div>
        <div class="form-btns" style="margin-top:4px">
          <button class="form-submit blue" onclick="saveWorkout()">Save workout</button>
          <button class="form-cancel" onclick="toggleAddWorkout()">Cancel</button>
        </div>
      </div>
    </div>
    <div id="workouts-list"></div>
  </div>
</div>

<div class="page" id="page-progress">
  <div class="body">
    <div class="section-header">
      <span class="section-title">Progress</span>
      <button class="add-btn green" onclick="toggleAddProgress()">+ Log entry</button>
    </div>
    <div id="goal-card" class="progress-card" style="margin-bottom:12px"></div>
    <div id="add-progress-form" style="display:none" class="progress-card">
      <div style="padding:14px">
        <div class="fi-label" style="margin-bottom:6px">Date</div>
        <input class="fi" id="p-date" type="date" style="margin-bottom:10px"/>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
          <div>
            <div class="fi-label">Weight (kg)</div>
            <input class="fi" id="p-weight" type="number" inputmode="decimal" placeholder="68.0"/>
          </div>
          <div>
            <div class="fi-label">Waist (cm)</div>
            <input class="fi" id="p-waist" type="number" inputmode="decimal" placeholder="75"/>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
          <div>
            <div class="fi-label">Hips (cm)</div>
            <input class="fi" id="p-hips" type="number" inputmode="decimal" placeholder="95"/>
          </div>
          <div>
            <div class="fi-label">Chest (cm)</div>
            <input class="fi" id="p-chest" type="number" inputmode="decimal" placeholder="90"/>
          </div>
        </div>
        <div style="margin-bottom:12px">
          <div class="fi-label">Notes (optional)</div>
          <input class="fi" id="p-notes" placeholder="How are you feeling?"/>
        </div>
        <div class="form-btns">
          <button class="form-submit green" onclick="saveProgress()">Save entry</button>
          <button class="form-cancel" onclick="toggleAddProgress()">Cancel</button>
        </div>
      </div>
    </div>
    <div id="progress-chart-container" style="display:none" class="progress-card">
      <div class="chart-container">
        <div class="chart-title">Weight over time (kg)</div>
        <canvas id="weight-chart" height="120"></canvas>
      </div>
    </div>
    <div id="progress-list"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-macros" onclick="switchPage('macros')">
    <span class="nav-icon">🍽️</span>Macros
  </button>
  <button class="nav-btn" id="nav-workout" onclick="switchPage('workout')">
    <span class="nav-icon">💪</span>Workout
  </button>
  <button class="nav-btn" id="nav-progress" onclick="switchPage('progress')">
    <span class="nav-icon">📈</span>Progress
  </button>
</div>

<script>
// ─── CONSTANTS ───────────────────────────────────────────────────
const GOALS = { calories:1300, protein:85, carbs:130, fat:50 };

const DEFAULT_MACROS = [
  { id:"2026-03-16", label:"Mon 16 Mar", meals:[
    { id:1, name:"Breakfast", icon:"☀️", items:[
      { id:1, name:"2x small whole wheat toast", cal:120, protein:4, carbs:22, fat:1.5 },
      { id:2, name:"Shredded tomato", cal:15, protein:0.5, carbs:3, fat:0 },
      { id:3, name:"150ml light Chocomel", cal:75, protein:3.5, carbs:12, fat:1 },
    ]},
    { id:2, name:"Morning Snack", icon:"🍎", items:[] },
    { id:3, name:"Lunch", icon:"🌤️", items:[
      { id:4, name:"2x whole wheat bread", cal:160, protein:6, carbs:28, fat:2 },
      { id:5, name:"Canned tuna (~80g)", cal:85, protein:19, carbs:0, fat:1 },
      { id:6, name:"Mayo (~15g)", cal:100, protein:0, carbs:0, fat:11 },
      { id:7, name:"Lettuce & tomato", cal:10, protein:0.5, carbs:2, fat:0 },
      { id:8, name:"Capers (~10g)", cal:3, protein:0, carbs:0, fat:0 },
    ]},
    { id:4, name:"Afternoon Snack", icon:"🍌", items:[] },
    { id:5, name:"Dinner", icon:"🌙", items:[
      { id:9, name:"1x chicken fajita", cal:341, protein:25, carbs:40, fat:9.3 },
    ]},
  ]},
  { id:"2026-03-17", label:"Tue 17 Mar", meals:[
    { id:1, name:"Breakfast", icon:"☀️", items:[
      { id:1, name:"1x small brown bread toast", cal:60, protein:2, carbs:11, fat:0.75 },
      { id:2, name:"Shredded tomato", cal:15, protein:0.5, carbs:3, fat:0 },
      { id:3, name:"Olive oil drizzle (~7g)", cal:62, protein:0, carbs:0, fat:7 },
      { id:4, name:"150ml light Chocomel", cal:75, protein:3.5, carbs:12, fat:1 },
    ]},
    { id:2, name:"Morning Snack", icon:"🍎", items:[] },
    { id:3, name:"Lunch", icon:"🌤️", items:[
      { id:5, name:"1x chicken fajita", cal:341, protein:25, carbs:40, fat:9.3 },
    ]},
    { id:4, name:"Afternoon Snack", icon:"🍌", items:[] },
    { id:5, name:"Dinner", icon:"🌙", items:[] },
  ]},
];

// ─── STATE ────────────────────────────────────────────────────────
let macroDays = [], activeDayIdx = 0, addingTo = null, showAddDay = false;
let workouts = [], showAddWorkout = false, workoutType = 'lift';
let progressEntries = [], showAddProgress = false;
let currentPage = 'macros';
let nextId = 500;

// ─── PERSIST ─────────────────────────────────────────────────────
function load() {
  try {
    const s = localStorage.getItem('fitlog_v2');
    if (s) {
      const d = JSON.parse(s);
      macroDays = d.macroDays || JSON.parse(JSON.stringify(DEFAULT_MACROS));
      activeDayIdx = Math.min(d.activeDayIdx || 0, macroDays.length - 1);
      workouts = d.workouts || [];
      progressEntries = d.progressEntries || [];
    } else {
      macroDays = JSON.parse(JSON.stringify(DEFAULT_MACROS));
    }
  } catch(e) { macroDays = JSON.parse(JSON.stringify(DEFAULT_MACROS)); }
}
function save() {
  try { localStorage.setItem('fitlog_v2', JSON.stringify({ macroDays, activeDayIdx, workouts, progressEntries })); } catch(e) {}
}

// ─── UTILS ────────────────────────────────────────────────────────
function sum(arr, k) { return arr.reduce((a,i) => a + (parseFloat(i[k])||0), 0); }
function dayTotals(day) {
  const all = day.meals.flatMap(m => m.items);
  return { cal:sum(all,'cal'), protein:sum(all,'protein'), carbs:sum(all,'carbs'), fat:sum(all,'fat') };
}
function mealTotals(meal) {
  return { cal:sum(meal.items,'cal'), protein:sum(meal.items,'protein'), carbs:sum(meal.items,'carbs'), fat:sum(meal.items,'fat') };
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function todayStr() { return new Date().toISOString().slice(0,10); }
function fmtDate(s) {
  if (!s) return '';
  const d = new Date(s + 'T00:00:00');
  return d.toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' });
}

// ─── PAGE SWITCH ─────────────────────────────────────────────────
function switchPage(p) {
  currentPage = p;
  ['macros','workout','progress'].forEach(name => {
    document.getElementById('page-' + name).classList.toggle('active', name === p);
    document.getElementById('nav-' + name).classList.toggle('active', name === p);
  });
  const dayTabs = document.getElementById('day-tabs');
  dayTabs.style.display = p === 'macros' ? 'flex' : 'none';
  document.getElementById('header-sub').style.display = p === 'macros' ? 'block' : 'none';
  const titles = { macros:"Sofia's Weight Loss Journey", workout:'Workouts', progress:'Progress' };
  document.getElementById('header-title').textContent = titles[p];
  if (p === 'workout') renderWorkouts();
  if (p === 'progress') renderProgress();
}

// ─── SVG GAUGE ────────────────────────────────────────────────────
function svgGauge(value, max, color, label) {
  const r = 26, circ = 2*Math.PI*r, pct = Math.min(value/max,1), dash = pct*circ;
  return `<div class="gauge-wrap">
    <svg width="66" height="66" viewBox="0 0 66 66">
      <circle cx="33" cy="33" r="${r}" fill="none" stroke="#f0ece4" stroke-width="5.5"/>
      <circle cx="33" cy="33" r="${r}" fill="none" stroke="${color}" stroke-width="5.5"
        stroke-dasharray="${dash.toFixed(1)} ${circ.toFixed(1)}"
        stroke-linecap="round" transform="rotate(-90 33 33)"/>
      <text x="33" y="30" text-anchor="middle" font-size="11" font-weight="700" fill="#2d2416" font-family="'DM Serif Display',serif">${Math.round(value)}</text>
      <text x="33" y="43" text-anchor="middle" font-size="8" fill="#9a8c7a" font-family="'DM Sans',sans-serif">g</text>
    </svg>

  const pct = Math.round((t.cal/GOALS.calories)*100);

  document.getElementById('summary-card').innerHTML = `

function renderMacros() { renderDayTabs(); renderSummary(); renderMeals(); document.getElementById('footer-goals').textContent = `Goals: ${GOALS.calories} kcal · ${GOALS.protein}g protein · ${GOALS.carbs}g carbs · ${GOALS.fat}g fat`; }

function switchDay(i) { activeDayIdx=i; addingTo=null; save(); renderMacros(); }
function toggleAddForm(dayIdx, mealId) {
  addingTo = (addingTo && addingTo.dayIdx===dayIdx && addingTo.mealId===mealId) ? null : { dayIdx, mealId };
  renderMacros();
  if (addingTo) setTimeout(() => { const el=document.getElementById('fi-search'); if(el) el.focus(); }, 50);
}
function cancelAdd() { addingTo=null; renderMacros(); }
async function lookupMacros(dayIdx, mealId) {
  const query = document.getElementById('fi-search').value.trim();
  if (!query) { alert('Please type a food name first.'); return; }
  const loadEl = document.getElementById(`fi-loading-${mealId}`);
  const resultEl = document.getElementById(`fi-result-${mealId}`);
  const errorEl = document.getElementById(`fi-error-${mealId}`);
  const manualToggle = document.getElementById(`fi-manual-toggle-${mealId}`);
  loadEl.style.display='block'; resultEl.style.display='none'; errorEl.style.display='none'; manualToggle.style.display='none';
  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 300,
        system: 'You are a nutrition expert. When given a food description, return ONLY a JSON object with these fields: name (clean food name), cal (calories as number), protein (grams as number), carbs (grams as number), fat (grams as number), note (one short sentence about portion assumption). No markdown, no extra text, just the JSON object.',
        messages: [{ role: 'user', content: `What are the macros for: ${query}` }]
      })
    });
    const data = await response.json();
    const text = data.content.map(c => c.text||'').join('');
    const clean = text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);
    loadEl.style.display='none';
    document.getElementById(`fi-result-name-${mealId}`).textContent = parsed.name || query;
    document.getElementById(`fi-r-cal-${mealId}`).textContent = parsed.cal || '-';
    document.getElementById(`fi-r-protein-${mealId}`).textContent = (parsed.protein||'-')+'g';
    document.getElementById(`fi-r-carbs-${mealId}`).textContent = (parsed.carbs||'-')+'g';
    document.getElementById(`fi-r-fat-${mealId}`).textContent = (parsed.fat||'-')+'g';
    document.getElementById(`fi-r-note-${mealId}`).textContent = parsed.note || '';
    document.getElementById(`fi-cal-${mealId}`).value = parsed.cal || '';
    document.getElementById(`fi-protein-${mealId}`).value = parsed.protein || '';
    document.getElementById(`fi-carbs-${mealId}`).value = parsed.carbs || '';
    document.getElementById(`fi-fat-${mealId}`).value = parsed.fat || '';
    resultEl.style.display='block';
  } catch(e) {
    loadEl.style.display='none';
    errorEl.textContent = 'Could not look up macros. Try again or enter manually.';
    errorEl.style.display='block';
    manualToggle.style.display='flex';
  }
}

function confirmItem(dayIdx, mealId) {
  const name = document.getElementById(`fi-result-name-${mealId}`).textContent;
  const cal = parseFloat(document.getElementById(`fi-cal-${mealId}`).value)||0;
  const protein = parseFloat(document.getElementById(`fi-protein-${mealId}`).value)||0;
  const carbs = parseFloat(document.getElementById(`fi-carbs-${mealId}`).value)||0;
  const fat = parseFloat(document.getElementById(`fi-fat-${mealId}`).value)||0;
  if (!cal) { alert('Please enter at least the calories.'); return; }
  const meal = macroDays[dayIdx].meals.find(m=>m.id===mealId);
  if (meal) { meal.items.push({ id:nextId++, name, cal, protein, carbs, fat }); addingTo=null; save(); renderMacros(); }
}

function toggleManual(mealId) {
  const el = document.getElementById(`fi-manual-${mealId}`);
  el.style.display = el.style.display==='none' ? 'block' : 'none';
}

function submitManualItem(dayIdx, mealId) {
  const name = document.getElementById(`fi-manual-name-${mealId}`).value.trim();
  const cal = parseFloat(document.getElementById(`fi-manual-cal-${mealId}`).value)||0;
  if (!name||!cal) { alert('Please enter at least a food name and calories.'); return; }
  const meal = macroDays[dayIdx].meals.find(m=>m.id===mealId);
  if (meal) {
    meal.items.push({ id:nextId++, name, cal, protein:parseFloat(document.getElementById(`fi-manual-protein-${mealId}`).value)||0, carbs:parseFloat(document.getElementById(`fi-manual-carbs-${mealId}`).value)||0, fat:parseFloat(document.getElementById(`fi-manual-fat-${mealId}`).value)||0 });
    addingTo=null; save(); renderMacros();
  }
}
function deleteItem(dayIdx, mealId, itemId) {
  const meal = macroDays[dayIdx].meals.find(m=>m.id===mealId);
  if (meal) { meal.items=meal.items.filter(i=>i.id!==itemId); save(); renderMacros(); }
}
function toggleAddDay() { showAddDay=!showAddDay; document.getElementById('add-day-form').style.display=showAddDay?'block':'none'; }
function addDay() {
  const label=document.getElementById('new-day-label').value.trim(), id=document.getElementById('new-day-id').value.trim();
  if (!label||!id) { alert('Please fill in both fields.'); return; }
  macroDays.push({ id, label, meals:[
    {id:1,name:'Breakfast',icon:'☀️',items:[]},
    {id:2,name:'Morning Snack',icon:'🍎',items:[]},
    {id:3,name:'Lunch',icon:'🌤️',items:[]},
    {id:4,name:'Afternoon Snack',icon:'🫐',items:[]},
    {id:5,name:'Dinner',icon:'🌙',items:[]},
  ]});
  activeDayIdx=macroDays.length-1; showAddDay=false;
  document.getElementById('add-day-form').style.display='none';
  save(); renderMacros();
}

function addExerciseRow() { exerciseRows.push({name:'',sets:'',reps:'',weight:''}); renderWorkoutTypeFields(); }
function removeExerciseRow(i) { exerciseRows.splice(i,1); renderWorkoutTypeFields(); }
function updateExRow(i, key, val) { if(exerciseRows[i]) exerciseRows[i][key]=val; }

function saveWorkout() {
  const date = document.getElementById('w-date').value;
  if (!date) { alert('Please select a date.'); return; }
  if (workoutType === 'cardio') {
    const activity = document.getElementById('w-activity').value.trim();
    if (!activity) { alert('Please enter an activity name.'); return; }
    workouts.unshift({ id:nextId++, type:'cardio', date, activity,
      duration:parseFloat(document.getElementById('w-duration').value)||0,
      distance:parseFloat(document.getElementById('w-distance').value)||0,
      cals:parseFloat(document.getElementById('w-cals').value)||0,
      notes:document.getElementById('w-notes').value.trim() });
  } else {
    if (exerciseRows.length===0) { alert('Please add at least one exercise.'); return; }
    workouts.unshift({ id:nextId++, type:'lift', date, exercises:exerciseRows.filter(r=>r.name), notes:document.getElementById('w-notes').value.trim() });
  }
  showAddWorkout=false;
  document.getElementById('add-workout-form').style.display='none';
  save(); renderWorkouts();

}

const WEIGHT_START = 68;
const WEIGHT_GOAL = 58;

// ─── PROGRESS ─────────────────────────────────────────────────────
function toggleAddProgress() {
  showAddProgress=!showAddProgress;
  const el=document.getElementById('add-progress-form');
  el.style.display=showAddProgress?'block':'none';
  if (showAddProgress) document.getElementById('p-date').value=todayStr();
}

function saveProgress() {
  const date=document.getElementById('p-date').value;
  if (!date) { alert('Please select a date.'); return; }
  const weight=parseFloat(document.getElementById('p-weight').value)||null;
  const waist=parseFloat(document.getElementById('p-waist').value)||null;
  const hips=parseFloat(document.getElementById('p-hips').value)||null;
  const chest=parseFloat(document.getElementById('p-chest').value)||null;
  const notes=document.getElementById('p-notes').value.trim();
  if (!weight && !waist && !hips && !chest) { alert('Please enter at least one measurement.'); return; }
  progressEntries.unshift({ id:nextId++, date, weight, waist, hips, chest, notes });
  progressEntries.sort((a,b)=>b.date.localeCompare(a.date));
  showAddProgress=false;
  document.getElementById('add-progress-form').style.display='none';
  save(); renderProgress();
}

function deleteProgress(id) { progressEntries=progressEntries.filter(e=>e.id!==id); save(); renderProgress(); }

function renderGoalCard() {
  const weightEntries = [...progressEntries].filter(e=>e.weight).sort((a,b)=>b.date.localeCompare(a.date));
  const current = weightEntries.length > 0 ? weightEntries[0].weight : WEIGHT_START;
  const totalToLose = WEIGHT_START - WEIGHT_GOAL;
  const lost = WEIGHT_START - current;
  const remaining = Math.max(0, current - WEIGHT_GOAL);
  const pct = Math.min(Math.max(lost / totalToLose, 0), 1);
  const done = current <= WEIGHT_GOAL;
  document.getElementById('goal-card').innerHTML = `
    <div style="padding:18px">
      <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;font-weight:600;margin-bottom:10px">Weight Goal</div>
      <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:14px">
        <div>
          <div style="font-family:var(--serif);font-size:32px;color:var(--dark);line-height:1">${current}<span style="font-family:var(--sans);font-size:13px;color:var(--muted)"> kg now</span></div>
          <div style="font-size:11px;color:var(--muted);margin-top:3px">${done ? '🎉 Goal reached!' : remaining.toFixed(1)+' kg to go · goal: '+WEIGHT_GOAL+' kg'}</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:11px;color:var(--green);font-weight:700">${lost > 0 ? '▼ '+lost.toFixed(1)+' kg lost' : 'Starting point'}</div>
          <div style="font-size:10px;color:var(--muted)">started at ${WEIGHT_START} kg</div>
        </div>
      </div>
      <div style="background:var(--light);border-radius:99px;height:8px;overflow:hidden;margin-bottom:6px">
        <div style="height:100%;border-radius:99px;background:${done?'var(--gold)':'linear-gradient(90deg,var(--green),var(--gold))'};width:${Math.round(pct*100)}%;transition:width 0.6s ease"></div>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--muted)">
        <span>${WEIGHT_START} kg</span>
        <span style="font-weight:700;color:var(--green)">${Math.round(pct*100)}% there</span>
        <span>🎯 ${WEIGHT_GOAL} kg</span>
      </div>
    </div>`;
}

function renderWeightChart() {
  const entries = [...progressEntries].filter(e=>e.weight).sort((a,b)=>a.date.localeCompare(b.date));
  if (entries.length < 2) { document.getElementById('progress-chart-container').style.display='none'; return; }
  document.getElementById('progress-chart-container').style.display='block';
  const canvas=document.getElementById('weight-chart');
  const ctx=canvas.getContext('2d');
  const dpr=window.devicePixelRatio||1;
  const w=canvas.parentElement.clientWidth-28, h=130;
  canvas.width=w*dpr; canvas.height=h*dpr; canvas.style.width=w+'px'; canvas.style.height=h+'px';
  ctx.scale(dpr,dpr);
  const vals=entries.map(e=>e.weight);
  const minV=Math.min(...vals, WEIGHT_GOAL)-1, maxV=Math.max(...vals, WEIGHT_START)+1;
  const pad={l:32,r:12,t:10,b:24};
  const chartW=w-pad.l-pad.r, chartH=h-pad.t-pad.b;
  ctx.clearRect(0,0,w,h);
  // grid
  ctx.strokeStyle='#f0ece4'; ctx.lineWidth=1;
  [0,0.5,1].forEach(f => {
    const y=pad.t+chartH*(1-f);
    ctx.beginPath(); ctx.moveTo(pad.l,y); ctx.lineTo(pad.l+chartW,y); ctx.stroke();
    ctx.fillStyle='#b0a090'; ctx.font='9px DM Sans,sans-serif'; ctx.textAlign='right';
    ctx.fillText((minV+(maxV-minV)*f).toFixed(1), pad.l-4, y+3);
  });
  // goal line
  const goalY = pad.t+chartH*(1-(WEIGHT_GOAL-minV)/(maxV-minV));
  ctx.save(); ctx.setLineDash([4,4]); ctx.strokeStyle='#c8a96e'; ctx.lineWidth=1.5;
  ctx.beginPath(); ctx.moveTo(pad.l, goalY); ctx.lineTo(pad.l+chartW, goalY); ctx.stroke();
  ctx.restore();
  ctx.fillStyle='#c8a96e'; ctx.font='bold 8px DM Sans,sans-serif'; ctx.textAlign='left';
  ctx.fillText('Goal '+WEIGHT_GOAL+'kg', pad.l+2, goalY-3);
  // line
  ctx.beginPath(); ctx.strokeStyle='#7a9e7e'; ctx.lineWidth=2.5; ctx.lineJoin='round';
  entries.forEach((e,i) => {
    const x=pad.l+i/(entries.length-1)*chartW;
    const y=pad.t+chartH*(1-(e.weight-minV)/(maxV-minV));
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.stroke();
  // dots + labels
  entries.forEach((e,i) => {
    const x=pad.l+i/(entries.length-1)*chartW;
    const y=pad.t+chartH*(1-(e.weight-minV)/(maxV-minV));
    ctx.beginPath(); ctx.arc(x,y,3.5,0,Math.PI*2); ctx.fillStyle='#7a9e7e'; ctx.fill();
    if (i===0||i===entries.length-1) {
      ctx.fillStyle='#9a8c7a'; ctx.font='8px DM Sans,sans-serif'; ctx.textAlign='center';
      ctx.fillText(fmtDate(e.date).split(' ').slice(1).join(' '), x, h-6);
    }
  });
}

function renderProgress() {
  renderGoalCard();
  renderWeightChart();
  const container=document.getElementById('progress-list');
  if (progressEntries.length===0) {
    container.innerHTML=`<div class="empty-state"><div class="empty-icon">📏</div>No progress entries yet.<br>Log your first measurements to start tracking!</div>`;
    return;
  }
  const sorted=[...progressEntries].sort((a,b)=>b.date.localeCompare(a.date));
  container.innerHTML=`<div class="progress-card">`+sorted.map((e,i) => {
    const prev=sorted[i+1];
    const weightDiff=prev&&e.weight&&prev.weight ? (e.weight-prev.weight).toFixed(1) : null;
    const diffHTML=weightDiff ? `<span class="progress-diff ${parseFloat(weightDiff)<0?'down':'up'}">${parseFloat(weightDiff)>0?'+':''}${weightDiff}kg</span>` : '';
    return `<div class="progress-entry">
      <div>
        <div class="progress-date">${fmtDate(e.date)}</div>
        ${e.notes?`<div style="font-size:10px;color:var(--muted);margin-top:2px;font-style:italic">${esc(e.notes)}</div>`:''}
        ${diffHTML}
      </div>
      <div style="display:flex;align-items:center;gap:6px">
        <div class="progress-values">
          ${e.weight?`<div class="progress-val"><div class="progress-val-num">${e.weight}</div><div class="progress-val-label">kg</div></div>`:''}
          ${e.waist?`<div class="progress-val"><div class="progress-val-num">${e.waist}</div><div class="progress-val-label">waist</div></div>`:''}
          ${e.hips?`<div class="progress-val"><div class="progress-val-num">${e.hips}</div><div class="progress-val-label">hips</div></div>`:''}
          ${e.chest?`<div class="progress-val"><div class="progress-val-num">${e.chest}</div><div class="progress-val-label">chest</div></div>`:''}
        </div>
        <button class="del-btn" onclick="deleteProgress(${e.id})">×</button>
      </div>
    </div>`;
  }).join('')+`</div>`;
}

// ─── INIT ─────────────────────────────────────────────────────────
load();
renderMacros();
document.getElementById('day-tabs').style.display='flex';
</script>
